<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d11" />
  <title>Orari Dirigenti</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <!-- HEADER -->
    <header class="app-header">
      <div class="brand">
        <div class="logo-dot"></div>
        <h1>Orari Dirigenti</h1>
      </div>
      <button id="logoutButton" class="btn ghost" aria-label="Logout" title="Logout">Logout</button>
    </header>

    <!-- LOGIN -->
    <section id="loginSection" class="card">
      <h2 class="card-title">Accedi</h2>
      <div class="form-grid">
        <label class="field">
          <span class="label">Username</span>
          <input id="loginUsername" type="text" autocomplete="username" inputmode="text" />
        </label>
        <label class="field">
          <span class="label">Password</span>
          <input id="loginPassword" type="password" autocomplete="current-password" />
        </label>
      </div>
      <div class="row between">
        <span id="loginError" class="msg error" role="alert"></span>
        <button id="loginButton" class="btn primary">Entra</button>
      </div>
    </section>

    <!-- MAIN -->
    <main id="mainSection" class="hidden content">
      <!-- Data + Azioni veloci -->
      <section class="card">
        <div class="row between wrap">
          <label class="field slim">
            <span class="label">Data</span>
            <input id="selectedDate" type="date" />
          </label>
          <div class="row gap">
            <label class="field slim">
              <span class="label">Range rapido (es. 09:00 - 13:30)</span>
              <input id="rangeInput" type="text" inputmode="numeric" placeholder="09:00 - 13:30" />
            </label>
            <button id="addRangeButton" class="btn outline">Aggiungi</button>
          </div>
        </div>
      </section>

      <!-- Slot giornalieri -->
      <section class="card">
        <h2 class="card-title">I miei slot (30')</h2>
        <div id="slotsContainer" class="slots-grid" aria-live="polite"></div>
        <div class="row between">
          <div class="chip">Ore totali oggi: <strong id="totalHours">0</strong></div>
          <button id="saveButton" class="btn primary">Salva su Firestore</button>
        </div>
        <div id="saveMessage" class="msg" role="status" aria-live="polite"></div>
      </section>

      <!-- Tabella tutti gli utenti -->
      <section class="card">
        <h2 class="card-title">Orari di tutti (giorno selezionato)</h2>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr><th>Utente</th><th>Data</th><th>Slots</th><th>Ore Tot.</th></tr>
            </thead>
            <tbody id="allUsersTableBody"></tbody>
          </table>
        </div>
      </section>

      <!-- Statistiche -->
      <section class="card">
        <h2 class="card-title">Statistiche personali</h2>
        <div class="row wrap">
          <label class="field slim">
            <span class="label">Mese</span>
            <input id="selectedMonth" type="month" />
          </label>
          <button id="btnCalcStats" class="btn outline">Calcola</button>
        </div>
        <div class="stats">
          <div class="chip big">Ore nel mese: <strong id="monthlyHours">0</strong></div>
          <div class="chip big">Ore complessive: <strong id="totalHoursAll">0</strong></div>
        </div>
      </section>

      <!-- Report mensile PDF -->
      <section class="card" id="reportSection">
        <h2 class="card-title">Report mensile utente</h2>
        <div class="row wrap report-actions">
          <label class="field slim">
            <span class="label">Utente</span>
            <select id="reportUserSelect">
              <option value="">Seleziona utente</option>
            </select>
          </label>
          <label class="field slim">
            <span class="label">Mese</span>
            <input id="reportMonth" type="month" />
          </label>
          <button id="btnGenerateReport" class="btn outline">Genera report</button>
          <button id="btnDownloadPdf" class="btn primary" disabled>Scarica PDF</button>
        </div>

        <div id="reportMessage" class="msg" role="status" aria-live="polite"></div>

        <div class="stats report-summary">
          <div class="chip big">Totale mese: <strong id="reportTotalHours">0</strong></div>
          <div class="chip big">Giorni lavorati: <strong id="reportWorkedDays">0</strong></div>
        </div>

        <div class="table-wrap report-table-wrap">
          <table class="table">
            <thead>
              <tr><th>Giorno</th><th>Data</th><th>Orario da - a</th><th>Ore Tot.</th></tr>
            </thead>
            <tbody id="monthlyReportBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- Bottom actions (mobile) -->
    <nav class="bottom-bar" aria-label="Azioni rapide">
      <button id="navToday" class="nav-btn active">Oggi</button>
      <button id="navTop" class="nav-btn">Inizio</button>
      <button id="navSave" class="nav-btn accent">Salva</button>
    </nav>
  </div>

  <!-- JS PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- JS -->
  <script type="module" src="./main.js"></script>
</body>
</html>
